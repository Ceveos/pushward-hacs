create_activity:
  name: Create Activity
  description: Create a new PushWard Live Activity.
  fields:
    slug:
      name: Slug
      description: Unique activity slug identifier.
      required: true
      example: ha-washer
      selector:
        text: null
    name:
      name: Name
      description: Display name for the activity.
      required: true
      example: Washing Machine
      selector:
        text: null
    priority:
      name: Priority
      description: Activity priority (0 = lowest, 10 = highest).
      default: 1
      example: 1
      selector:
        number:
          min: 0
          max: 10
          mode: slider
    ended_ttl:
      name: Ended TTL
      description: Seconds to keep the activity after it ends. Leave empty to keep indefinitely.
      example: 300
      selector:
        number:
          min: 1
          max: 2592000
          mode: box
    stale_ttl:
      name: Stale TTL
      description: Seconds before the activity is considered stale. Leave empty to disable.
      example: 1800
      selector:
        number:
          min: 1
          max: 2592000
          mode: box
end_activity:
  name: End Activity
  description: End a PushWard Live Activity.
  fields:
    slug:
      name: Slug
      description: Activity slug identifier to end.
      required: true
      example: ha-washer
      selector:
        text: null
    completion_message:
      name: Completion Message
      description: Optional message shown when the activity ends.
      example: Washing complete!
      selector:
        text: null
delete_activity:
  name: Delete Activity
  description: Delete a PushWard Live Activity.
  fields:
    slug:
      name: Slug
      description: Activity slug identifier to delete.
      required: true
      example: ha-washer
      selector:
        text: null
send_notification:
  name: Send Notification
  description: Send a push notification via PushWard.
  fields:
    title:
      name: Title
      description: Notification title.
      required: true
      example: Door Opened
      selector:
        text: null
    body:
      name: Body
      description: Notification body text.
      required: true
      example: The front door was opened.
      selector:
        text:
          multiline: true
    subtitle:
      name: Subtitle
      description: Optional subtitle shown below the title.
      example: Living Room
      selector:
        text: null
    level:
      name: Level
      description: iOS interruption level. Controls how the notification is delivered.
      example: active
      selector:
        select:
          options:
          - passive
          - active
          - time-sensitive
          - critical
    volume:
      name: Volume
      description: Sound volume for critical alerts (0.0-1.0). Only used when level is critical.
      example: 0.8
      selector:
        number:
          min: 0
          max: 1
          step: 0.1
    thread_id:
      name: Thread ID
      description: Groups notifications together in Notification Center.
      example: home-security
      selector:
        text: null
    collapse_id:
      name: Collapse ID
      description: APNs deduplication key. Replaces previous notification with the same key. Max 64 characters.
      example: door-alert
      selector:
        text: null
    source:
      name: Source
      description: Source identifier for grouping in the PushWard inbox.
      example: home-assistant
      selector:
        text: null
    source_display_name:
      name: Source Display Name
      description: Human-readable source name shown in the PushWard inbox.
      example: Home Assistant
      selector:
        text: null
    activity_slug:
      name: Activity Slug
      description: Link this notification to an existing Live Activity.
      example: ha-washer
      selector:
        text: null
    url:
      name: URL
      description: Primary deep-link URL opened when the notification is tapped.
      example: https://example.com
      selector:
        text: null
    media:
      name: Media
      description: Optional image, video, or audio attachment hosted at an HTTPS URL.
      example: '{"url": "https://example.com/image.png", "type": "image"}'
      selector:
        object:
          fields:
            url:
              label: HTTPS media URL
              required: true
              selector:
                text:
                  type: url
            type:
              label: Media type
              required: true
              selector:
                select:
                  options:
                  - image
                  - video
                  - audio
    icon_url:
      name: Icon URL
      description: URL of a custom icon to display with the notification.
      example: https://example.com/icon.png
      selector:
        text: null
    metadata:
      name: Metadata
      description: Advanced optional key-value data for custom app handling. Use YAML/object syntax.
      selector:
        object: null
    actions:
      name: Actions
      description: Add up to 10 notification buttons. Expand a row to configure its destination and behavior.
      example: '[{"id": "open", "title": "Open", "url": "https://example.com", "foreground": true}, {"id": "ack", "title":
        "Acknowledge", "url": "https://example.com/ack", "method": "POST", "body": "ok"}]'
      selector:
        object:
          multiple: true
          label_field: title
          description_field: id
          fields:
            id:
              label: Action ID
              required: true
              selector:
                text: null
            title:
              label: Button title
              required: true
              selector:
                text: null
            url:
              label: URL or app deep link
              selector:
                text: null
            foreground:
              label: Open the URL visibly
              selector:
                boolean: null
            method:
              label: Silent webhook method
              selector:
                select:
                  options:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - HEAD
            headers:
              label: Silent webhook headers (advanced object)
              selector:
                object: null
            body:
              label: Silent webhook body
              selector:
                text:
                  multiline: true
            icon:
              label: SF Symbol
              selector:
                text: null
            destructive:
              label: Destructive styling
              selector:
                boolean: null
            authentication_required:
              label: Require device authentication
              selector:
                boolean: null
    push:
      name: Push
      description: Send as an APNs push alert to all devices. When false, the notification is stored in the inbox only.
      default: true
      selector:
        boolean: null
send_email:
  name: Send Email
  description: Send a transactional email via PushWard. Provide a text body, an HTML body, or both. The integration key needs
    the "emails" capability.
  fields:
    to:
      name: To
      description: Recipient email address. Must be an address you have already added and confirmed in the PushWard iOS app
        — unverified addresses are rejected.
      required: true
      example: alerts@example.com
      selector:
        text:
          type: email
    subject:
      name: Subject
      description: Email subject line.
      required: true
      example: Home Security Alert
      selector:
        text: null
    body:
      name: Body
      description: Plain-text email body. Provide this, an HTML body, or both.
      example: The front door was opened at 10:30 PM.
      selector:
        text:
          multiline: true
    html_body:
      name: HTML Body
      description: HTML email body. Provide this, a plain-text body, or both.
      example: <p>The front door was opened at <b>10:30 PM</b>.</p>
      selector:
        text:
          multiline: true
widget_refresh:
  name: Refresh Widget
  description: Force-refresh a tracked PushWard widget. Bypasses the in-memory diff cache so the widget is re-rendered and
    pushed to iOS even when the value hasn't changed.
  fields:
    slug:
      name: Slug
      description: Widget slug identifier. Either `slug` or `entity_id` must be provided.
      example: ha-sensor-registered-users
      selector:
        text: null
    entity_id:
      name: Entity
      description: HA entity bound to the widget. Resolved to the matching widget by config. Either `slug` or `entity_id`
        must be provided.
      example: sensor.registered_users
      selector:
        entity: null
delete_widget:
  name: Delete Widget
  description: Delete a PushWard widget from the server. If a tracked-widget config entry still drives this slug, the widget
    is recreated on the next restart/sync — remove the config entry to delete it permanently. Provide either slug or entity_id.
  fields:
    slug:
      name: Slug
      description: Widget slug identifier. Either `slug` or `entity_id` must be provided.
      example: ha-sensor-registered-users
      selector:
        text: null
    entity_id:
      name: Entity
      description: HA entity bound to the widget. Resolved to the matching widget by config. Either `slug` or `entity_id`
        must be provided.
      example: sensor.registered_users
      selector:
        entity: null
dispatch:
  name: Send via PushWard
  description: Send any combination of a Live Activity, notification, widget, and email in one Home Assistant action.
  fields:
    activity_channel:
      collapsed: true
      fields:
        activity_enabled:
          name: Send Live Activity
          description: Enable this section to upsert and update a Live Activity.
          default: false
          selector:
            boolean: {}
        activity_slug:
          name: Activity slug
          description: Unique URL-safe identifier. Required when Live Activity is enabled.
          selector:
            text: {}
        activity_state:
          name: Activity state
          description: Ongoing starts/updates the activity; ended completes it.
          selector:
            select:
              options:
              - ongoing
              - ended
        activity_template:
          name: Activity layout
          description: Layout expected by the content object below.
          selector:
            select:
              options:
              - generic
              - countdown
              - steps
              - alert
              - gauge
              - timeline
              - board
              - log
        activity_content:
          name: Activity content
          description: Template-specific content without the template field. Use a focused Update Activity action for a fully
            guided editor.
          selector:
            object: {}
        activity_sound:
          name: Update sound
          description: Optional sound for ongoing updates; ignored when ending.
          selector:
            select:
              options:
              - default
              - chime
              - alert
              - success
              - warning
              - bell
              - ding
              - buzz
              - notification
        activity_priority:
          name: Priority
          description: Optional per-update priority from 0 (lowest) to 10 (highest).
          selector:
            number:
              min: 0
              max: 10
              mode: slider
    notification_channel:
      collapsed: true
      fields:
        notification_enabled:
          name: Send notification
          description: Enable this section to send a PushWard inbox/APNs notification.
          default: false
          selector:
            boolean: {}
        notification_title:
          name: Notification title
          selector:
            text: {}
        notification_body:
          name: Notification body
          selector:
            text:
              multiline: true
        notification_subtitle:
          name: Notification subtitle
          selector:
            text: {}
        notification_level:
          name: Interruption level
          description: Passive is quiet; time-sensitive and critical require the corresponding iOS permissions.
          selector:
            select:
              options:
              - passive
              - active
              - time-sensitive
              - critical
        notification_push:
          name: Send APNs alert
          description: Disable to store the notification only in the PushWard inbox.
          default: true
          selector:
            boolean: {}
    widget_channel:
      collapsed: true
      fields:
        widget_enabled:
          name: Upsert widget
          description: Enable this section to create or replace a PushWard widget.
          default: false
          selector:
            boolean: {}
        widget_slug:
          name: Widget slug
          selector:
            text: {}
        widget_name:
          name: Widget display name
          selector:
            text: {}
        widget_template:
          name: Widget layout
          selector:
            select:
              options:
              - value
              - progress
              - gauge
              - status
              - stat_list
        widget_content:
          name: Widget content
          description: Layout-specific widget content without the template field.
          selector:
            object: {}
        widget_push_throttle:
          name: Push throttle
          description: Minimum seconds between server widget pushes, from 1 to 3,600.
          selector:
            number:
              min: 1
              max: 3600
              unit_of_measurement: seconds
              mode: box
    email_channel:
      collapsed: true
      fields:
        email_enabled:
          name: Send email
          description: Enable this section to send to a recipient verified in the PushWard app.
          default: false
          selector:
            boolean: {}
        email_to:
          name: Recipient
          selector:
            text:
              type: email
        email_subject:
          name: Subject
          selector:
            text: {}
        email_body:
          name: Plain-text body
          description: Provide this, the HTML body, or both.
          selector:
            text:
              multiline: true
        email_html_body:
          name: HTML body
          description: Provide this, the plain-text body, or both.
          selector:
            text:
              multiline: true
