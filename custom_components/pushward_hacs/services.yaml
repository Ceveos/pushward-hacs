update_activity_generic:
  fields:
    slug:
      required: true
      example: ha-washer
      selector:
        text: null
    state:
      required: true
      selector:
        select:
          options:
          - ongoing
          - ended
    state_text:
      example: Downloading
      selector:
        text: null
    labels:
      collapsed: true
      fields:
        subtitle:
          example: episode-01.mkv
          selector:
            text: null
        icon:
          example: arrow.down.circle.fill
          selector:
            text: null
        progress:
          example: 0.5
          selector:
            number:
              min: 0.0
              max: 1.0
              step: 0.01
              mode: slider
    action_buttons:
      collapsed: true
      fields:
        tap_action:
          example: '{"url": "homeassistant://navigate/lovelace/0"}'
          selector:
            object:
              fields:
                url:
                  label: URL or app deep link
                  required: true
                  selector:
                    text: {}
                foreground:
                  label: Open visibly instead of running silently
                  selector:
                    boolean: {}
                method:
                  label: Silent webhook method
                  selector:
                    select:
                      options:
                      - GET
                      - POST
                      - PUT
                      - PATCH
                      - DELETE
                      - HEAD
                headers:
                  label: Silent webhook headers (advanced object)
                  selector:
                    object: {}
                body:
                  label: Silent webhook body
                  selector:
                    text:
                      multiline: true
          description: Optional background tap destination. Configure a visible link/app deep link or a silent HTTP webhook.
        url_action:
          example: '{"url": "https://example.com", "title": "Open", "method": "POST"}'
          selector:
            object:
              fields:
                title:
                  label: Button title
                  selector:
                    text: {}
                icon:
                  label: SF Symbol
                  selector:
                    text: {}
                url:
                  label: URL or app deep link
                  required: true
                  selector:
                    text: {}
                foreground:
                  label: Open visibly instead of running silently
                  selector:
                    boolean: {}
                method:
                  label: Silent webhook method
                  selector:
                    select:
                      options:
                      - GET
                      - POST
                      - PUT
                      - PATCH
                      - DELETE
                      - HEAD
                headers:
                  label: Silent webhook headers (advanced object)
                  selector:
                    object: {}
                body:
                  label: Silent webhook body
                  selector:
                    text:
                      multiline: true
          description: Optional button with a visible destination or silent HTTP webhook.
        secondary_url_action:
          example: '{"url": "https://example.com/details", "title": "Details"}'
          selector:
            object:
              fields:
                title:
                  label: Button title
                  selector:
                    text: {}
                icon:
                  label: SF Symbol
                  selector:
                    text: {}
                url:
                  label: URL or app deep link
                  required: true
                  selector:
                    text: {}
                foreground:
                  label: Open visibly instead of running silently
                  selector:
                    boolean: {}
                method:
                  label: Silent webhook method
                  selector:
                    select:
                      options:
                      - GET
                      - POST
                      - PUT
                      - PATCH
                      - DELETE
                      - HEAD
                headers:
                  label: Silent webhook headers (advanced object)
                  selector:
                    object: {}
                body:
                  label: Silent webhook body
                  selector:
                    text:
                      multiline: true
          description: Optional button with a visible destination or silent HTTP webhook.
    display_options:
      collapsed: true
      fields:
        live_progress:
          description: Animate progress toward the estimated completion between pushes. Requires an end date or duration.
          selector:
            boolean: null
        duration:
          description: Estimated remaining duration in seconds or a value such as 10m or 1h30m.
          selector:
            text: null
        end_date:
          description: Estimated completion as a Unix timestamp. Overrides duration.
          selector:
            number:
              mode: box
        completion_message:
          example: Download complete!
          selector:
            text: null
        accent_color:
          example: blue
          selector:
            select:
              custom_value: true
              options:
              - red
              - orange
              - yellow
              - green
              - blue
              - purple
              - pink
              - indigo
              - teal
              - cyan
              - mint
              - brown
        background_color:
          example: '#1a2b3c'
          selector:
            select:
              custom_value: true
              options:
              - red
              - orange
              - yellow
              - green
              - blue
              - purple
              - pink
              - indigo
              - teal
              - cyan
              - mint
              - brown
        text_color:
          example: '#ffffff'
          selector:
            select:
              custom_value: true
              options:
              - red
              - orange
              - yellow
              - green
              - blue
              - purple
              - pink
              - indigo
              - teal
              - cyan
              - mint
              - brown
        remaining_time:
          example: 120
          selector:
            number:
              min: 0
              mode: box
        sound:
          example: chime
          selector:
            select:
              options:
              - default
              - chime
              - alert
              - success
              - warning
              - bell
              - ding
              - buzz
              - notification
        priority:
          example: 5
          selector:
            number:
              min: 0
              max: 10
              mode: slider
